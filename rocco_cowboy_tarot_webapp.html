    HOW TO USE YOUR GENERATED CARD IMAGES
    ================================================

       Format: 00-card-name.png
       Examples:
         - 00-the-fool.png
         - 01-the-magician.png
         - 21-the-world.png
         - 22-ace-of-wands.png
         - 35-king-of-wands.png
         - 36-ace-of-cups.png
         ... and so on for all 78 cards.
    
    3. For the card back, save it as: back.png (optional - currently uses styled back)
    
    The app will automatically try to load your real images. 
    If an image is missing, it will gracefully fall back to a styled placeholder.
    
    Tip: Use the card IDs from the JavaScript data (they are already numbered 0-77 in order).

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@300;400;500&amp;display=swap');
        
        :root {
            --gold: #C5A46E;
            --desert: #D4B896;
            --rose: #C17B6B;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-serif {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
        }

        .tarot-card {
            width: 180px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .tarot-card:hover {
            transform: translateY(-8px);
        }
        
        .tarot-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .tarot-card.flipped .tarot-card-inner {
            transform: rotateY(180deg);
        }
        
        .tarot-card-front, .tarot-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .tarot-card-front {
            background: linear-gradient(145deg, #f8f1e3, #e8d9c2);
            border: 8px solid #C5A46E;
        }
        
        .tarot-card-back {
            background: linear-gradient(145deg, #C5A46E, #A67C52);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        
        .deck-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        
        .section-tab {
            transition: all 0.3s ease;
        }
        
        .section-tab.active {
            border-bottom: 3px solid #C5A46E;
            color: #C5A46E;
            font-weight: 600;
        }
        
        .modal {
            animation: fadeInScale 0.3s ease forwards;
        }
        
        .rocco-gold {
            color: #C5A46E;
        }
        
        .desert-bg {
            background: linear-gradient(to bottom, #f8f1e3, #e8d9c2);
        }
        
        .tarot-meaning {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.25rem;
        }
        
        @media (max-width: 640px) {
            .tarot-card {
                width: 140px;
                height: 240px;
            }
        }
    </style>
</head>

        let currentFilter = 'all';
        let drawnCards = [];

        // Initialize the app
        function initApp() {
            initializeTailwind();
            populateGallery();
            
            // Show read section by default
            document.getElementById('section-read').classList.remove('hidden');
            document.getElementById('section-gallery').classList.add('hidden');
            
            // Keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === "Escape") {
                    const modal = document.getElementById('card-modal');
                    if (!modal.classList.contains('hidden')) {
                        closeModal();
                    }
                }
            });
            
            // Initial shuffle message
            console.log('%c[Rocco Cowboy Tarot] Web app initialized successfully', 'color:#C5A46E');
        }

        // Switch between Read and Gallery tabs
        function switchTab(tab) {
            const readSection = document.getElementById('section-read');
            const gallerySection = document.getElementById('section-gallery');
            const tabRead = document.getElementById('tab-read');
            const tabGallery = document.getElementById('tab-gallery');

            if (tab === 'read') {
                readSection.classList.remove('hidden');
                gallerySection.classList.add('hidden');
                tabRead.classList.add('active');
                tabGallery.classList.remove('active');
            } else {
                readSection.classList.add('hidden');
                gallerySection.classList.remove('hidden');
                tabRead.classList.remove('active');
                tabGallery.classList.add('active');
            }
        }

        // Shuffle the deck (visual animation)
        function shuffleDeck() {
            const container = document.getElementById('drawn-cards');
            container.innerHTML = '';
            drawnCards = [];
            
            // Visual shuffle effect
            const shuffleText = document.createElement('div');
            shuffleText.className = 'text-center py-8 text-[#C5A46E] font-medium flex items-center justify-center gap-x-3';
            shuffleText.innerHTML = `
                <i class="fa-solid fa-sync fa-spin"></i> 
                <span>Shuffling the desert winds...</span>
            `;
            container.appendChild(shuffleText);
            
            setTimeout(() => {
                container.innerHTML = '';
                const message = document.createElement('div');
                message.className = 'text-center py-6 text-[#8c735f] text-sm';
                message.innerHTML = 'The deck has been shuffled. Draw your cards.';
                container.appendChild(message);
            }, 1200);
        }

        // Draw cards
        function drawCards(count) {
            const container = document.getElementById('drawn-cards');
            container.innerHTML = '';
            drawnCards = [];
            
            // Get random cards (avoid duplicates)
            let availableCards = [...cards];
            const selected = [];
            
            for (let i = 0; i < count; i++) {
                if (availableCards.length === 0) break;
                const randomIndex = Math.floor(Math.random() * availableCards.length);
                selected.push(availableCards[randomIndex]);
                availableCards.splice(randomIndex, 1);
            }
            
            drawnCards = selected;
            
            // Create card elements
            selected.forEach((card, index) => {
                const cardElement = createCardElement(card, true, index);
                container.appendChild(cardElement);
                
                // Staggered animation
                setTimeout(() => {
                    cardElement.style.opacity = '1';
                    cardElement.style.transform = 'translateY(0)';
                }, index * 180);
            });
        }

        // Create a single card element
        function createCardElement(cardData, isDrawn = false, index = 0) {
            const card = document.createElement('div');
            card.className = `tarot-card mx-auto ${isDrawn ? 'opacity-0 translate-y-4 transition-all duration-500' : ''}`;
            card.dataset.cardId = cardData.id;
            
            // Try to load real generated card image, fallback to styled placeholder
            const imagePath = `cards/${String(cardData.id).padStart(2, '0')}-${cardData.name.toLowerCase().replace(/\s+/g, '-')}.png`;
            
            card.innerHTML = `
                <div class="tarot-card-inner shadow-xl">
                    <!-- Front -->
                    <div class="tarot-card-front p-3 flex flex-col">
                        <div class="flex-1 relative overflow-hidden rounded-xl border border-[#C5A46E]/30 bg-[#f8f1e3]">
                            <img src="${imagePath}" 
                                 class="w-full h-full object-cover"
                                 onerror="this.style.display='none'; this.parentElement.innerHTML = \`
                                    <div class='w-full h-full flex items-center justify-center bg-gradient-to-br from-[#f8f1e3] to-[#e8d9c2]'>
                                        <div class='text-center p-4'>
                                            <div class='text-[#C5A46E] text-xs tracking-widest mb-1'>${cardData.type.toUpperCase()}</div>
                                            <div class='heading-serif text-2xl text-[#3f2a1e] leading-none mb-1'>${cardData.name}</div>
                                            <div class='text-[#C5A46E] text-sm'>${cardData.number}</div>
                                        </div>
                                    </div>\`;">
                            
                            <!-- Decorative corner elements -->
                            <div class="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-[#C5A46E]/40 rounded-tl pointer-events-none"></div>
                            <div class="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-[#C5A46E]/40 rounded-tr pointer-events-none"></div>
                            <div class="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-[#C5A46E]/40 rounded-bl pointer-events-none"></div>
                            <div class="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-[#C5A46E]/40 rounded-br pointer-events-none"></div>
                        </div>
                        
                        <div class="mt-3 text-center">
                            <div class="text-[#3f2a1e] font-semibold text-sm tracking-wide">${cardData.name}</div>
                            <div class="text-[#C5A46E] text-xs">${cardData.type}</div>
                        </div>
                    </div>
                    
                    <!-- Back -->
                    <div class="tarot-card-back p-4" style="background: linear-gradient(145deg, #C5A46E, #A67C52);">
                        <div class="text-center">
                            <i class="fa-solid fa-hat-cowboy text-white text-4xl mb-3 opacity-90"></i>
                            <div class="text-white text-xs tracking-[3px] font-semibold">ROCCO</div>
                            <div class="text-white text-xs tracking-[3px] font-semibold -mt-1">COWBOY</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Click to flip or show modal
            card.addEventListener('click', () => {
                if (isDrawn) {
                    if (!card.classList.contains('flipped')) {
                        card.classList.add('flipped');
                    } else {
                        showCardModal(cardData);
                    }
                } else {
                    showCardModal(cardData);
                }
            });
            
            return card;
        }

        function getSuitColor(suit) {
            switch(suit) {
                case 'wands': return '#C17B6B';
                case 'cups': return '#6B8E9F';
                case 'swords': return '#8B7E74';
                case 'pentacles': return '#C5A46E';
                default: return '#C5A46E';
            }
        }

        // Show card in modal
        function showCardModal(cardData) {
            const modal = document.getElementById('card-modal');
            const modalInner = document.getElementById('modal-card-inner');
            
            // Reset flip state
            modalInner.classList.remove('flipped');
            
            // Populate content
            document.getElementById('modal-card-name').innerText = cardData.name;
            document.getElementById('modal-card-type').innerText = `${cardData.type} • ${cardData.number}`;
            document.getElementById('modal-card-meaning').innerText = cardData.meaning;
            
            // Keywords
            const keywordsContainer = document.getElementById('modal-card-keywords');
            keywordsContainer.innerHTML = '';
            cardData.keywords.forEach(keyword => {
                const tag = document.createElement('span');
                tag.className = 'px-4 py-1 bg-[#f8f1e3] text-[#3f2a1e] text-xs rounded-3xl border border-[#C5A46E]/30';
                tag.innerText = keyword;
                keywordsContainer.appendChild(tag);
            });
            
            // Try to load real generated card image
            const imgContainer = document.getElementById('modal-card-image');
            const imagePath = `cards/${String(cardData.id).padStart(2, '0')}-${cardData.name.toLowerCase().replace(/\s+/g, '-')}.png`;
            
            imgContainer.src = imagePath;
            imgContainer.alt = cardData.name;
            
            // Fallback if image fails to load
            imgContainer.onerror = function() {
                this.style.display = 'none';
                const parent = this.parentElement;
                parent.innerHTML = `
                    <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-[#f8f1e3] to-[#e8d9c2] rounded-xl">
                        <div class="text-center p-6">
                            <div class="text-[#C5A46E] text-sm tracking-widest mb-2">${cardData.type.toUpperCase()}</div>
                            <div class="heading-serif text-3xl text-[#3f2a1e] mb-1">${cardData.name}</div>
                            <div class="text-[#C5A46E]">${cardData.number}</div>
                        </div>
                    </div>
                `;
            };
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Allow flipping in modal
            const visual = document.getElementById('modal-card-visual');
            visual.onclick = () => {
                modalInner.classList.toggle('flipped');
            };
        }

        function closeModal() {
            const modal = document.getElementById('card-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // Populate Gallery
        function populateGallery(filteredCards = null) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            
            const cardsToShow = filteredCards || cards;
            
            cardsToShow.forEach(cardData => {
                const cardEl = createCardElement(cardData, false);
                grid.appendChild(cardEl);
            });
        }

        // Filter gallery by suit
        function filterBySuit(suit) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'bg-[#C5A46E]', 'text-white'));
            event.currentTarget.classList.add('active', 'bg-[#C5A46E]', 'text-white');
            
            let filtered = cards;
            
            if (suit !== 'all') {
                filtered = cards.filter(c => c.suit === suit);
            }
            
            currentFilter = suit;
            populateGallery(filtered);
        }

        // Search in gallery
        function filterGallery() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            
            let filtered = cards;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(c => c.suit === currentFilter);
            }
            
            if (searchTerm.length > 0) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(searchTerm) || 
                    c.meaning.toLowerCase().includes(searchTerm)
                );
            }
            
            populateGallery(filtered);
        }

        // Initialize everything
        window.onload = function() {
            initApp();
            
            // Demo: Draw 3 cards on first load (optional)
            setTimeout(() => {
                // Uncomment the line below if you want auto-draw on load
                // drawCards(3);
            }, 800);
        };
    </script>
